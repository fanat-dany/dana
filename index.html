<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Дана · комплименты с магией</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #fef9f4, #fff2ef);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* контейнер для падающих сердечек */
        .heart-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .falling-heart {
            position: absolute;
            font-size: 28px;
            opacity: 0.8;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .angel-card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(6px);
            border-radius: 64px;
            padding: 2rem 1.8rem 2.2rem;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 210, 200, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.3s;
        }

        .angel-card.shaking {
            animation: cardShake 0.3s ease-in-out 3;
        }

        @keyframes cardShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
        }

        .name {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #B280A5, #7F7BB6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            font-size: 0.85rem;
            color: #b48c9c;
            border-bottom: 1px dashed #f3cfc3;
            display: inline-block;
            padding-bottom: 4px;
            margin-bottom: 24px;
        }

        .compliment-box {
            background: #ffffffd9;
            border-radius: 48px;
            padding: 2rem 1.2rem;
            margin: 20px 0 18px;
            box-shadow: inset 0 0 0 1px #ffffff, 0 12px 22px -12px rgba(90, 40, 40, 0.2);
        }

        .compliment-text {
            font-size: 1.7rem;
            line-height: 1.35;
            font-weight: 450;
            color: #2C2A42;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            animation: softGlow 0.25s ease-out;
        }

        .angel-button {
            background: #fff0eb;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #aa6f8a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
        }

        .angel-button:hover {
            background: #ffe3dc;
            transform: scale(1.02);
            color: #914e70;
        }

        .angel-button:active {
            transform: scale(0.98);
        }

        /* магическая кнопка — появляется только после 10 комплиментов */
        .magic-button {
            background: linear-gradient(135deg, #FFD166, #FF9F7C);
            color: white;
            margin-left: 12px;
            box-shadow: 0 4px 15px rgba(255, 100, 100, 0.3);
            display: none;
        }

        .magic-button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #FFC857, #FF8C5A);
            color: white;
        }

        .counter {
            font-size: 0.7rem;
            color: #cfa2b2;
            margin-top: 28px;
            border-top: 1px solid #ffe0d6;
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        /* прогресс-бар к магии */
        .progress-area {
            margin-top: 16px;
            background: #f3e1da;
            border-radius: 30px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #FF9F7C, #FF6B8A);
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.3s ease;
        }

        .magic-hint {
            font-size: 11px;
            color: #cc9a8a;
            margin-top: 8px;
        }

        .tiny-star {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 10px;
        }

        /* финальное сообщение */
        .final-message {
            margin-top: 20px;
            background: #fff0eb;
            border-radius: 40px;
            padding: 16px;
            display: none;
            font-size: 1rem;
            color: #b13b5c;
            font-weight: 500;
            animation: softGlow 0.4s ease-out;
        }

        @media (max-width: 480px) {
            .angel-card { padding: 1.5rem; }
            .compliment-text { font-size: 1.4rem; }
            .name { font-size: 2.5rem; }
        }

        @keyframes softGlow {
            0% { opacity: 0.6; transform: translateY(6px);}
            100% { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<div class="heart-rain" id="heartRain"></div>

<div class="angel-card" id="card">
    <div class="name">Дана ✧</div>
    <div class="sub">10 комплиментов = магия</div>

    <div class="compliment-box">
        <div class="compliment-text" id="complimentDisplay">
            💙 нажми на кнопку, чтобы начать 💙
        </div>
    </div>

    <div>
        <button class="angel-button" id="nextComplimentBtn">
            ✨ ещё комплимент ✨
        </button>
        <button class="angel-button magic-button" id="magicBtn">
            🌟 ВКЛЮЧИТЬ МАГИЮ 🌟
        </button>
    </div>

    <div class="progress-area">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="magic-hint" id="magicHint">💫 нажми «ещё комплимент» 10 раз — откроется волшебство</div>

    <div class="final-message" id="finalMessage">
        💖✨ Спасибо, что ты есть. Ты сделала мой день просто своим существованием. ✨💖
    </div>

    <div class="counter">
        <span>💙 голубые глаза</span>
        <span>🪽 гладкая кожа</span>
        <span>🎵 ангельский голос</span>
        <span>👁️ ресницы</span>
        <span>😊 улыбка</span>
    </div>
    <div class="tiny-star">✨ 10 комплиментов = магия ✨</div>
</div>

<script>
    // ТВОИ КОМПЛИМЕНТЫ (скопировано в точности)
    const compliments = [
        "Твои голубые глаза сияют ярче, чем полярная звезда в тёмную ночь.",
        "Твои ресницы — как бархатные крылья бабочки. Они делают твой взгляд глубже океана.",
        "Твои глаза — два маленьких неба, в которых хочется заблудиться навсегда.",
        "Каждая твоя ресничка — словно штрих гения. Даже просто моргание выглядит искусством.",
        "В твоих голубых глазах отражается всё хорошее, что есть в этом мире.",
        "Твоя кожа гладкая, как первый снег, который никто не успел тронуть.",
        "Твой голос звучит как самый ценный инструмент в оркестре вселенной.",
        "Твоя кожа — это шёлк, по которому хочется писать стихи кончиками пальцев.",
        "Когда ты улыбаешься — внутри всё переключается на хорошее настроение.",
        "Твои голубые глаза даже без слов говорят больше, чем чужие получасовые монологи."
    ];

    let lastIndex = -1;
    let complimentCount = 0;      // сколько комплиментов показали
    let magicUnlocked = false;    // открыта ли магия

    const displayDiv = document.getElementById('complimentDisplay');
    const nextBtn = document.getElementById('nextComplimentBtn');
    const magicBtn = document.getElementById('magicBtn');
    const progressFill = document.getElementById('progressFill');
    const magicHint = document.getElementById('magicHint');
    const finalMessageDiv = document.getElementById('finalMessage');
    const card = document.getElementById('card');

    // получить случайный комплимент (без повторов подряд)
    function getRandomCompliment() {
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * compliments.length);
        } while (newIndex === lastIndex && compliments.length > 1);
        lastIndex = newIndex;
        return compliments[newIndex];
    }

    // обновить прогресс и проверить, открывать ли магию
    function updateProgress() {
        let percent = (complimentCount / 10) * 100;
        if (percent > 100) percent = 100;
        progressFill.style.width = percent + '%';

        if (complimentCount >= 10 && !magicUnlocked) {
            magicUnlocked = true;
            magicBtn.style.display = 'inline-flex';
            magicHint.innerHTML = '✨ МАГИЯ РАЗБЛОКИРОВАНА! Нажми на блестящую кнопку ✨';
            magicHint.style.color = '#FF6B8A';
            magicHint.style.fontWeight = 'bold';
        }
    }

    // показать новый комплимент
    function showNewCompliment() {
        if (complimentCount < 10) {
            complimentCount++;
            updateProgress();
        }

        const newText = getRandomCompliment();
        displayDiv.style.opacity = '0';
        setTimeout(() => {
            displayDiv.innerText = newText;
            displayDiv.style.opacity = '1';
        }, 80);

        if (navigator.vibrate) navigator.vibrate(20);
    }

    // запустить ливень сердечек
    function startHeartRain() {
        const container = document.getElementById('heartRain');
        
        // убираем старые сердечки
        container.innerHTML = '';
        
        // создаём 60 падающих сердечек
        for (let i = 0; i < 60; i++) {
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💓', '💘', '💝', '✨'][Math.floor(Math.random() * 7)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (20 + Math.random() * 30) + 'px';
                heart.style.animationDuration = (2 + Math.random() * 3) + 's';
                heart.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(heart);
                
                // удаляем сердечко после анимации
                setTimeout(() => {
                    if (heart.parentNode) heart.remove();
                }, 5000);
            }, i * 40);
        }
        
        // тряска карточки
        card.classList.add('shaking');
        setTimeout(() => card.classList.remove('shaking'), 800);
        
        // показываем финальное сообщение
        finalMessageDiv.style.display = 'block';
        
        // скрываем магическую кнопку после использования (чтобы не спамить)
        magicBtn.style.display = 'none';
        
        // меняем подсказку
        magicHint.innerHTML = '💫 Магия активирована! Сердечки летят к тебе 💫';
        
        // вибрация на телефоне (если поддерживается)
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

    // обработчики кнопок
    nextBtn.addEventListener('click', showNewCompliment);
    magicBtn.addEventListener('click', startHeartRain);

    // при загрузке показываем первый случайный комплимент
    window.addEventListener('load', () => {
        let randomStart = compliments[Math.floor(Math.random() * compliments.length)];
        displayDiv.innerText = randomStart;
        lastIndex = compliments.indexOf(randomStart);
        complimentCount = 1;
        updateProgress();
    });
</script>
</body>
</html>
