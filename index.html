<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Дана · бесконечность комплиментов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* чтобы не выделялся текст случайно */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #fef9f4, #fff2ef);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* главная карточка — как облако */
        .angel-card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(6px);
            border-radius: 64px;
            padding: 2rem 1.8rem 2.2rem;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 210, 200, 0.5);
            text-align: center;
            transition: all 0.2s;
        }

        /* имя с лёгким свечением */
        .name {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #B280A5, #7F7BB6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .sub {
            font-size: 0.85rem;
            color: #b48c9c;
            border-bottom: 1px dashed #f3cfc3;
            display: inline-block;
            padding-bottom: 4px;
            margin-bottom: 24px;
        }

        /* контейнер для комплимента — крупно и нежно */
        .compliment-box {
            background: #ffffffd9;
            border-radius: 48px;
            padding: 2rem 1.2rem;
            margin: 20px 0 18px;
            box-shadow: inset 0 0 0 1px #ffffff, 0 12px 22px -12px rgba(90, 40, 40, 0.2);
        }

        .compliment-text {
            font-size: 1.7rem;
            line-height: 1.35;
            font-weight: 450;
            color: #2C2A42;
            transition: all 0.2s ease;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        /* кнопка — нежная, но заметная */
        .angel-button {
            background: #fff0eb;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #aa6f8a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(4px);
            margin-top: 8px;
        }

        .angel-button:hover {
            background: #ffe3dc;
            transform: scale(1.02);
            box-shadow: 0 12px 20px -12px rgba(160, 100, 100, 0.3);
            color: #914e70;
        }

        .angel-button:active {
            transform: scale(0.98);
        }

        /* счётчик комплиментов – лёгкий акцент */
        .counter {
            font-size: 0.7rem;
            color: #cfa2b2;
            margin-top: 28px;
            letter-spacing: 0.3px;
            border-top: 1px solid #ffe0d6;
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 18px;
        }

        /* звёздный декор */
        .tiny-star {
            font-size: 12px;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .angel-card {
                padding: 1.5rem;
            }
            .compliment-text {
                font-size: 1.4rem;
            }
            .name {
                font-size: 2.5rem;
            }
        }

        /* анимация появления */
        @keyframes softGlow {
            0% { opacity: 0.6; transform: translateY(6px);}
            100% { opacity: 1; transform: translateY(0);}
        }
        .compliment-text {
            animation: softGlow 0.25s ease-out;
        }
    </style>
</head>
<body>

<div class="angel-card">
    <div class="name">Дана ✧</div>
    <div class="sub">собрание комплиментов для самой самой</div>

    <div class="compliment-box">
        <div class="compliment-text" id="complimentDisplay">
            твои глаза — будто кусочек неба, который случайно оказался на земле
        </div>
    </div>

    <button class="angel-button" id="nextComplimentBtn">
        ✨ ещё комплимент ✨
    </button>
    <div class="tiny-star">нажимай — каждый раз новое признание</div>
</div>

<script>
    // КОЛЛЕКЦИЯ КОМПЛИМЕНТОВ — индивидуально для Даны
    const compliments = [
        "Дана, твои голубые глаза сияют ярче, чем полярная звезда в ясную ночь.",
        "У тебя не просто кожа — она как лепесток магнолии: невероятно гладкая и светящаяся.",
        "Когда ты говоришь, кажется, что ангелы учат тебя петь. Твой голос — чистая магия.",
        "Твои ресницы — как бархатные крылья бабочки. Они делают твой взгляд глубже океана.",
        "Дана, твоя кожа настолько гладкая, что время останавливается, когда я смотрю на твои руки.",
        "голос, которым ты произносишь моё имя — это мелодия, которую я хочу слушать вечность.",
        "Твои глаза — два маленьких неба, в которых хочется заблудиться навсегда.",
        "Каждая твоя ресничка — словно штрих гения. Даже просто моргание выглядит искусством.",
        "Твоя кожа пахнет молоком и ванилью… я никогда не чувствовал ничего более нежного.",
        "Дана, когда ты поёшь даже просто напевая, мир становится добрее. Искренне.",
        "В твоих голубых глазах отражается всё хорошее, что есть в этом мире.",
        "Твоя кожа гладкая, как первый снег, который никто не успел тронуть.",
        "Я боюсь, что твои ресницы однажды поднимутся так высоко, что ты улетишь в рай… останься здесь.",
        "Твой голос звучит как самый ценный инструмент в оркестре вселенной.",
        "Ты можешь просто промолчать — и даже твоя тишина музыкальна. Спасибо за твой голос, Дана.",
        "Твоя кожа — это шёлк, по которому хочется писать стихи кончиками пальцев.",
        "Если бы у ангелов был Instagram, твои глаза собирали бы миллионы лайков.",
        "Дана, твои ресницы такие длинные, что создают тень… и в этой тени я хочу прятаться от всех проблем.",
        "Голос, который заставляет сердце биться медленнее, а потом вдруг — быстрее. Это про тебя.",
        "Твоя кожа поглажена ветром и лунным светом. Никакой шёлк не сравнится."
    ];

    let currentIndex = 0;
    const displayDiv = document.getElementById('complimentDisplay');
    const btn = document.getElementById('nextComplimentBtn');

    // функция показа случайного комплимента (но с приоритетом чтобы не повторялись слишком часто)
    let lastIndex = -1;

    function getRandomCompliment() {
        let newIndex;
        do {
            newIndex = Math.floor(Math.random() * compliments.length);
        } while (newIndex === lastIndex && compliments.length > 1);
        lastIndex = newIndex;
        return compliments[newIndex];
    }

    function updateCompliment() {
        const newText = getRandomCompliment();
        // небольшая плавная смена
        displayDiv.style.opacity = '0';
        setTimeout(() => {
            displayDiv.innerText = newText;
            displayDiv.style.opacity = '1';
        }, 80);
        // лёгкая вибрация на мобилках если хочется (очень деликатно)
        if (navigator.vibrate) navigator.vibrate(20);
    }

    // обработчик кнопки
    btn.addEventListener('click', updateCompliment);

    // при первом открытии — тоже рандомный комплимент (не первый из списка)
    window.addEventListener('load', () => {
        // установим случайный красивый комплимент при старте, минуя первый
        let randomStart = compliments[Math.floor(Math.random() * compliments.length)];
        displayDiv.innerText = randomStart;
        // запомним его индекс
        lastIndex = compliments.indexOf(randomStart);
    });
</script>
</body>
</html>
